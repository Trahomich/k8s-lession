# DNS-01 Challenge через Cloudflare
#
# Для wildcard-сертификатов (*.example.com) или если Ingress
# недоступен из интернета. cert-manager создаёт TXT-запись в DNS.
#
# Перед применением:
# 1. Создать secret с Cloudflare API Token:
#    kubectl create secret generic cloudflare-api-token \
#      --namespace cert-manager \
#      --from-literal=api-token=YOUR_CLOUDFLARE_API_TOKEN
#
# 2. Подставить свой email и домен
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-dns
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: your-email@example.com
    privateKeySecretRef:
      name: letsencrypt-dns-key
    solvers:
      - dns01:
          cloudflare:
            email: your-email@example.com
            apiTokenSecretRef:
              name: cloudflare-api-token
              key: api-token
        # Какие домены обрабатывать этим solver-ом
        selector:
          dnsZones:
            - example.com
