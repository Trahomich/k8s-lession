# ClusterIssuer — Let's Encrypt Staging
# Использовать для тестирования! Сертификаты недоверенные, но нет rate limit.
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
spec:
  acme:
    # Сервер Let's Encrypt staging
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    # Email для уведомлений об истечении сертификатов
    email: your-email@example.com
    # Название секрета с приватным ключом аккаунта ACME
    privateKeySecretRef:
      name: letsencrypt-staging-key
    solvers:
      # HTTP-01 challenge — самый простой вариант
      - http01:
          ingress:
            class: nginx
