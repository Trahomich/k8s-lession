apiVersion: v1
kind: Pod
metadata:
  name: app-with-secret
  namespace: lesson
spec:
  containers:
    - name: app
      image: busybox
      command: ["sh", "-c", "echo $DB_USER:$DB_PASSWORD && sleep 3600"]
      env:
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: db-secret
              key: DB_USER
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: db-secret
              key: DB_PASSWORD
  restartPolicy: Never
