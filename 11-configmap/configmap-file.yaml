apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  namespace: lesson
data:
  # целый конфиг-файл внутри ConfigMap
  nginx.conf: |
    server {
        listen 80;
        server_name localhost;

        location / {
            root   /usr/share/nginx/html;
            index  index.html index.htm;
        }

        location /health {
            return 200 'OK';
            add_header Content-Type text/plain;
        }
    }
---
apiVersion: v1
kind: Pod
metadata:
  name: nginx-with-config
  namespace: lesson
spec:
  containers:
    - name: nginx
      image: nginx:alpine
      ports:
        - containerPort: 80
      volumeMounts:
        - name: config-volume
          mountPath: /etc/nginx/conf.d/default.conf
          subPath: nginx.conf    # монтируем только один файл
  volumes:
    - name: config-volume
      configMap:
        name: nginx-config
  restartPolicy: Never
